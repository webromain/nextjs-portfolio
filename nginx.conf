server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed Next.js build assets never change content for a given filename.
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # HTML must always be revalidated so a tab never keeps referencing
    # assets from a build the git-poller has already replaced.
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ $uri.html =404;
    }
}
